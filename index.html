<!DOCTYPE html>

<html>
<head>
  <title>Firebase Login</title>
</head>
<body>

<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Enter Email"><br><br> <input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="signup()">Signup</button> <button onclick="login()">Login</button>

<p id="msg"></p>

<!-- ✅ Firebase (correct version) -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
/* ✅ Tumhara exact Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAUAZqm-Z-pMZm8LVOB9l7tvOvSctrMWrI",
  authDomain: "prince-wolding.firebaseapp.com",
  projectId: "prince-wolding",
  storageBucket: "prince-wolding.firebasestorage.app",
  messagingSenderId: "96058652719",
  appId: "1:96058652719:web:65b1cf24d4ed48c1cf6eda",
  measurementId: "G-M17TCHY2XL"
};

/* Firebase initialize */
firebase.initializeApp(firebaseConfig);

/* Signup */
function signup() {
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  if(email === "" || password === "") {
    document.getElementById("msg").innerHTML = "❗ Fill all fields";
    return;
  }

  if(password.length < 6) {
    document.getElementById("msg").innerHTML = "❗ Password must be 6+ characters";
    return;
  }

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("msg").innerHTML = "✅ Signup success";
    })
    .catch(err => {
      document.getElementById("msg").innerHTML = "❌ " + err.message;
    });
}

/* Login */
function login() {
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("msg").innerHTML = "✅ Login success";
    })
    .catch(err => {
      document.getElementById("msg").innerHTML = "❌ " + err.message;
    });
}
</script>

</body>
</html>
