<body>


<div class="navbar">

  <div class="logo">
    Global Users
  </div>

  <a href="home.html" class="home-btn">
    Home
  </a>

</div>


<div class="container" id="userContainer">

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  arrayUnion
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// FIREBASE CONFIG

const firebaseConfig = {

  apiKey: "AIzaSyAUAZqm-Z-pMZm8LVOB9l7tvOvSctrMWrI",

  authDomain: "prince-wolding.firebaseapp.com",

  projectId: "prince-wolding",

  storageBucket: "prince-wolding.firebasestorage.app",

  messagingSenderId: "96058652719",

  appId: "1:96058652719:web:65b1cf24d4ed48c1cf6eda",

  measurementId: "G-M17TCHY2XL"

};


// INIT

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// LOAD USERS

async function loadUsers(){

  const querySnapshot =
  await getDocs(collection(db,"users"));

  const userContainer =
  document.getElementById("userContainer");

  userContainer.innerHTML = "";


  querySnapshot.forEach((docSnap)=>{

    const data = docSnap.data();

    const userId = docSnap.id;

    const likes = data.likes || 0;

    const dislikes = data.dislikes || 0;

    const comments = data.comments || [];


    const div = document.createElement("div");

    div.className = "card";


    div.innerHTML = `

      <div class="top">

        <img src="${data.image || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">

        <div>

          <h3>${data.name || 'User'}</h3>

          <p>${data.email || ''}</p>

        </div>

      </div>


      <div class="bio">
        ${data.bio || 'No bio added'}
      </div>


      <div class="actions">

        <button onclick="likeUser('${userId}',${likes})">
          👍 Like ${likes}
        </button>

        <button onclick="dislikeUser('${userId}',${dislikes})">
          👎 Dislike ${dislikes}
        </button>

      </div>


      <div class="comment-box">

        <input type="text"
        id="comment-${userId}"
        placeholder="Write comment...">

        <button onclick="addComment('${userId}')">
          Send
        </button>

      </div>


      <div class="comments">

        ${comments.map(c=>`
          <div class='comment'>${c}</div>
        `).join('')}

      </div>

    `;


    userContainer.appendChild(div);

  });

}


loadUsers();


// LIKE

window.likeUser = async(id,current)=>{

  await updateDoc(doc(db,"users",id),{

    likes: current + 1

  });

  loadUsers();

};


// DISLIKE

window.dislikeUser = async(id,current)=>{

  await updateDoc(doc(db,"users",id),{

    dislikes: current + 1

  });

  loadUsers();

};


// COMMENT

window.addComment = async(id)=>{

  const input =
  document.getElementById("comment-" + id);

  const comment = input.value;

  if(comment==="")return;

  await updateDoc(doc(db,"users",id),{

    comments: arrayUnion(comment)

  });

  input.value = "";

  loadUsers();

};

</script>

</body>
